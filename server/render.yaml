# Render Blueprint for the Node.js API.
# Create a new "Blueprint" service in Render pointing at this repo/folder,
# then fill in the environment variables marked sync:false in the dashboard.
services:
  - type: web
    name: password-reset-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RESET_TOKEN_EXPIRY_MINUTES
        value: "15"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
